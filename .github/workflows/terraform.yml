name: Terraform

on:
  pull_request:
    paths: ["terraform/**", "statemachine/**", "functions/**", "web/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**", "statemachine/**", "functions/**", "web/**", ".github/workflows/terraform.yml"]
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to run terraform destroy. Leave blank for a normal manual plan.'
        required: false
        default: ''
      skip_final_snapshot:
        description: "Skip terraform's own final snapshot on cluster delete (default: true - the destroy job already snapshots + exports to S3 before this point, so this would just be a redundant extra RDS snapshot)"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write # required to request the GitHub OIDC token
  contents: read
  pull-requests: write # so `plan` can comment on the PR

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: npm install (esbuild is invoked by terraform apply/plan via local-exec)
        run: npm install --no-audit --no-fund

      # Pre-build every Lambda bundle explicitly, rather than relying on
      # terraform/build.tf's null_resource local-exec to have run first:
      # local-exec provisioners only execute during `apply`, never `plan`, so a
      # bare `terraform plan` on a fresh checkout would hit the exact
      # "missing directory" archive_file error this step exists to avoid.
      - name: Build Lambda bundles
        run: |
          set -e
          for fn in trigger-ingest index-video check-indexing-status run-compliance-analysis \
                    parse-and-persist apply-suggestion-logic persist-final handle-pipeline-error \
                    weekly-eval run-platform-compliance detect-talent api; do
            npx esbuild "functions/$fn/index.js" --bundle --platform=node --target=node20 \
              --external:@aws-sdk/* --outfile="terraform/dist/$fn/index.js"
          done

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      # terraform/versions.tf declares a partial `backend "s3" {}` - bucket/
      # table/region live in repo variables (set once under Settings > Secrets
      # and variables > Actions), not committed, since they're account-specific.
      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}"
        working-directory: terraform

      - name: terraform validate
        run: terraform validate
        working-directory: terraform

      # AURORA_SUBNET_IDS / DB_SUBNET_IDS / NAT_SUBNET_IDS / VPC_SECURITY_GROUP_IDS
      # repo variables must be set as HCL/JSON list literals with each subnet
      # ID double-quoted, e.g. ["subnet-abc123","subnet-def456"] - TF_VAR_* for
      # a list(string) variable is parsed as HCL, not CSV, so unquoted values
      # are parsed as variable references and fail with "Variables not
      # allowed". AURORA_SUBNET_IDS must match the subnets the DB subnet group
      # already has today (check with `aws rds describe-db-subnet-groups`) -
      # changing it requires recreating the Aurora instance.
      - name: terraform plan
        run: terraform plan -input=false
        working-directory: terraform
        env:
          TF_VAR_ingest_bucket_name: ${{ vars.INGEST_BUCKET_NAME }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_aurora_subnet_ids: ${{ vars.AURORA_SUBNET_IDS }}
          TF_VAR_db_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
          TF_VAR_nat_subnet_ids: ${{ vars.NAT_SUBNET_IDS }}
          TF_VAR_vpc_security_group_ids: ${{ vars.VPC_SECURITY_GROUP_IDS }}
          TF_VAR_tl_index_id: ${{ vars.TL_INDEX_ID }}
          TF_VAR_tl_api_key: ${{ secrets.TL_API_KEY }}

  apply:
    name: terraform apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: aws-deploy # requires a manual reviewer approval - configure under repo Settings > Environments
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: npm install --no-audit --no-fund

      - name: Build Lambda bundles
        run: |
          set -e
          for fn in trigger-ingest index-video check-indexing-status run-compliance-analysis \
                    parse-and-persist apply-suggestion-logic persist-final handle-pipeline-error \
                    weekly-eval run-platform-compliance detect-talent api; do
            npx esbuild "functions/$fn/index.js" --bundle --platform=node --target=node20 \
              --external:@aws-sdk/* --outfile="terraform/dist/$fn/index.js"
          done

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}"
        working-directory: terraform

      - run: terraform apply -input=false -auto-approve
        working-directory: terraform
        env:
          TF_VAR_ingest_bucket_name: ${{ vars.INGEST_BUCKET_NAME }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_aurora_subnet_ids: ${{ vars.AURORA_SUBNET_IDS }}
          TF_VAR_db_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
          TF_VAR_nat_subnet_ids: ${{ vars.NAT_SUBNET_IDS }}
          TF_VAR_vpc_security_group_ids: ${{ vars.VPC_SECURITY_GROUP_IDS }}
          TF_VAR_tl_index_id: ${{ vars.TL_INDEX_ID }}
          TF_VAR_tl_api_key: ${{ secrets.TL_API_KEY }}

  destroy:
    name: terraform destroy
    # Manual-only, and only when the operator typed the exact confirmation
    # phrase into the workflow_dispatch input - a blank/mistyped value just
    # skips this job silently rather than doing anything destructive.
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_destroy == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: aws-destroy # separate approval gate from apply's aws-deploy - create under repo Settings > Environments with its own reviewers
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: npm install --no-audit --no-fund

      - name: Build Lambda bundles
        run: |
          set -e
          for fn in trigger-ingest index-video check-indexing-status run-compliance-analysis \
                    parse-and-persist apply-suggestion-logic persist-final handle-pipeline-error \
                    weekly-eval run-platform-compliance detect-talent api; do
            npx esbuild "functions/$fn/index.js" --bundle --platform=node --target=node20 \
              --external:@aws-sdk/* --outfile="terraform/dist/$fn/index.js"
          done

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}"
        working-directory: terraform

      # Snapshot the cluster and export it to the dedicated backup bucket
      # (terraform/rds_backup.tf) - GitHub-hosted runners have no network
      # path into the VPC, so this uses RDS's native snapshot-export-to-S3
      # (control-plane only) rather than pg_dump. Polls export status with a
      # bounded number of attempts rather than looping forever if something
      # goes wrong.
      - name: Snapshot Aurora and export it to S3
        run: |
          set -e
          TS=$(date +%Y%m%d%H%M%S)
          SNAPSHOT_ID="ads-ingest-teardown-$TS"
          EXPORT_ID="ads-ingest-teardown-export-$TS"

          echo "Creating snapshot $SNAPSHOT_ID..."
          aws rds create-db-cluster-snapshot \
            --db-cluster-identifier ads-ingest-aurora \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID"
          aws rds wait db-cluster-snapshot-available --db-cluster-snapshot-identifier "$SNAPSHOT_ID"

          SNAPSHOT_ARN=$(aws rds describe-db-cluster-snapshots \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID" \
            --query 'DBClusterSnapshots[0].DBClusterSnapshotArn' --output text)
          BACKUP_BUCKET=$(terraform output -raw rds_backup_bucket_name)
          EXPORT_ROLE_ARN=$(terraform output -raw rds_export_role_arn)
          KMS_KEY_ID=$(terraform output -raw rds_backup_kms_key_id)
          KMS_ALIAS_NAME=$(terraform output -raw rds_backup_kms_alias_name)

          # Captured now, while these resources are still in state and
          # `terraform output` can resolve them - the re-import step after
          # destroy runs against a state that no longer has them, so it
          # can't look these up itself.
          echo "BACKUP_BUCKET=$BACKUP_BUCKET" >> "$GITHUB_ENV"
          echo "KMS_KEY_ID=$KMS_KEY_ID" >> "$GITHUB_ENV"
          echo "KMS_ALIAS_NAME=$KMS_ALIAS_NAME" >> "$GITHUB_ENV"

          echo "Exporting $SNAPSHOT_ID to s3://$BACKUP_BUCKET..."
          aws rds start-export-task \
            --export-task-identifier "$EXPORT_ID" \
            --source-arn "$SNAPSHOT_ARN" \
            --s3-bucket-name "$BACKUP_BUCKET" \
            --iam-role-arn "$EXPORT_ROLE_ARN" \
            --kms-key-id "$KMS_KEY_ID"

          echo "Waiting for the export to complete..."
          for i in $(seq 1 90); do
            STATUS=$(aws rds describe-export-tasks --export-task-identifier "$EXPORT_ID" --query 'ExportTasks[0].Status' --output text)
            echo "  [$i/90] export status: $STATUS"
            case "$STATUS" in
              COMPLETE) break ;;
              CANCELED|FAILED) echo "Export task ended with status $STATUS"; exit 1 ;;
            esac
            if [ "$i" -eq 90 ]; then echo "Export did not complete in time"; exit 1; fi
            sleep 30
          done
        working-directory: terraform

      # The backup bucket and its KMS key must survive the destroy below, or
      # the export we just took becomes permanently unreadable (RDS export
      # requires a customer-managed key, and once it's gone the encrypted
      # files can never be decrypted) - detaching them from state leaves the
      # real AWS resources untouched while `terraform destroy` no longer
      # knows they exist. The export IAM role isn't needed to read the
      # backup back later, so it's left in state and destroyed normally.
      - name: Detach the backup bucket and its KMS key from Terraform state
        run: |
          set -e
          terraform state rm aws_s3_bucket_public_access_block.rds_backup
          terraform state rm aws_s3_bucket.rds_backup
          terraform state rm aws_kms_alias.rds_backup
          terraform state rm aws_kms_key.rds_backup
        working-directory: terraform

      # aws_s3_bucket.web has no force_destroy, and always has objects in it
      # (the built UI) - terraform destroy fails with BucketNotEmpty otherwise.
      - name: Empty the web bucket
        run: |
          set -e
          BUCKET=$(terraform output -raw web_bucket_name)
          aws s3 rm "s3://$BUCKET" --recursive
        working-directory: terraform

      - run: terraform destroy -input=false -auto-approve
        working-directory: terraform
        env:
          TF_VAR_ingest_bucket_name: ${{ vars.INGEST_BUCKET_NAME }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_aurora_subnet_ids: ${{ vars.AURORA_SUBNET_IDS }}
          TF_VAR_db_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
          TF_VAR_nat_subnet_ids: ${{ vars.NAT_SUBNET_IDS }}
          TF_VAR_vpc_security_group_ids: ${{ vars.VPC_SECURITY_GROUP_IDS }}
          TF_VAR_tl_index_id: ${{ vars.TL_INDEX_ID }}
          TF_VAR_tl_api_key: ${{ secrets.TL_API_KEY }}
          # The export above already captured the data - terraform's own
          # final-snapshot-on-delete would just be a redundant, separately
          # billed RDS snapshot, so this defaults to skipping it.
          TF_VAR_skip_final_snapshot: ${{ inputs.skip_final_snapshot }}

      # Re-attach the bucket/key to state now that everything else is gone,
      # so the state file ends this run in a self-consistent condition - the
      # next `terraform apply` sees them as already-existing/unchanged
      # rather than failing with "already exists".
      - name: Re-import the backup bucket and KMS key into state
        run: |
          set -e
          terraform import aws_s3_bucket.rds_backup "$BACKUP_BUCKET"
          terraform import aws_s3_bucket_public_access_block.rds_backup "$BACKUP_BUCKET"
          terraform import aws_kms_key.rds_backup "$KMS_KEY_ID"
          terraform import aws_kms_alias.rds_backup "$KMS_ALIAS_NAME"
        working-directory: terraform
        env:
          TF_VAR_ingest_bucket_name: ${{ vars.INGEST_BUCKET_NAME }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_aurora_subnet_ids: ${{ vars.AURORA_SUBNET_IDS }}
          TF_VAR_db_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
          TF_VAR_nat_subnet_ids: ${{ vars.NAT_SUBNET_IDS }}
          TF_VAR_vpc_security_group_ids: ${{ vars.VPC_SECURITY_GROUP_IDS }}
          TF_VAR_tl_index_id: ${{ vars.TL_INDEX_ID }}
          TF_VAR_tl_api_key: ${{ secrets.TL_API_KEY }}
